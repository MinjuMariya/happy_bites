<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Happy Bites</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, var(--accent) 0%, var(--secondary) 100%);
            padding: 2rem;
        }

        .auth-container {
            background: var(--white);
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            animation: fadeInUp 0.8s ease-out;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .auth-header h1 {
            font-size: 2.5rem;
            color: var(--primary-dark);
            margin-bottom: 0.5rem;
        }

        .auth-header p {
            color: var(--text-light);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-dark);
        }

        .form-control {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid var(--accent);
            border-radius: var(--radius);
            font-family: var(--font-body);
            transition: var(--transition);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(212, 163, 115, 0.1);
        }

        .auth-btn {
            width: 100%;
            margin-top: 1rem;
        }

        .auth-footer {
            text-align: center;
            margin-top: 2rem;
            color: var(--text-light);
        }

        .auth-footer a {
            color: var(--primary-dark);
            font-weight: 700;
        }

        .error-banner {
            background: #fee2e2;
            color: #991b1b;
            padding: 1rem;
            border-radius: var(--radius);
            margin-bottom: 1.5rem;
            text-align: center;
            font-size: 0.9rem;
            border: 1px solid #fecaca;
        }
    </style>
</head>

<body class="auth-page">
    <div class="auth-container">
        <div class="auth-header">
            <a href="/" class="logo" style="justify-content: center; margin-bottom: 1rem;">
                <img src="static/assets/images/logo.jpeg" alt="Happy Bites Logo" class="logo-img">
                <span class="logo-text">Happy Bites</span>
            </a>
            <h1>Welcome Back</h1>
            <p>Login to your account to place orders</p>
        </div>

        {% if error %}
        <div class="error-banner">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" required
                    placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" required
                    placeholder="Enter your password">
            </div>
            <button type="submit" class="btn btn-primary auth-btn">Sign In</button>
        </form>

        <div class="auth-footer">
            <p>Don't have an account? <a href="/signup">Sign Up</a></p>
            <p style="margin-top: 10px;"><a href="/" style="font-weight: 400; font-size: 0.9rem;">← Back to Home</a></p>
        </div>
    </div>
</body>

</html>
