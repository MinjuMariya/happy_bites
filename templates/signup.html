<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Happy Bites</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, var(--accent) 0%, var(--secondary) 100%);
            padding: 2rem;
        }

        .auth-container {
            background: var(--white);
            padding: 3rem;
            width: 100%;
            max-width: 500px;
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            animation: fadeInUp 0.8s ease-out;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .auth-header h1 {
            font-size: 2.5rem;
            color: var(--primary-dark);
            margin-bottom: 0.5rem;
        }

        .auth-header p {
            color: var(--text-light);
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-dark);
        }

        .form-control {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid var(--accent);
            border-radius: var(--radius);
            font-family: var(--font-body);
            transition: var(--transition);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(212, 163, 115, 0.1);
        }

        .auth-btn {
            width: 100%;
            margin-top: 1rem;
        }

        .auth-footer {
            text-align: center;
            margin-top: 2rem;
            color: var(--text-light);
        }

        .auth-footer a {
            color: var(--primary-dark);
            font-weight: 700;
        }

        .error-banner {
            background: #fee2e2;
            color: #991b1b;
            padding: 1rem;
            border-radius: var(--radius);
            margin-bottom: 1.5rem;
            text-align: center;
            font-size: 0.9rem;
            border: 1px solid #fecaca;
        }

        @media (max-width: 480px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body class="auth-page">
    <div class="auth-container">
        <div class="auth-header">
            <a href="/" class="logo" style="justify-content: center; margin-bottom: 1rem;">
                <img src="static/assets/images/logo.jpeg" alt="Happy Bites Logo" class="logo-img">
                <span class="logo-text">Happy Bites</span>
            </a>
            <h1>Create Account</h1>
            <p>Join our community of food lovers</p>
        </div>

        {% if error %}
        <div class="error-banner">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/signup">
            <div class="form-group">
                <label for="full_name">Full Name</label>
                <input type="text" id="full_name" name="full_name" class="form-control" required placeholder="John Doe">
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" required
                    placeholder="john@example.com">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <div class="phone-input-group">
                        <span class="prefix-box">+91</span>
                        <input type="tel" id="phone" name="phone_dummy" class="form-control phone-input" required
                            placeholder="9876543210" maxlength="10" pattern="[6-9][0-9]{9}"
                            title="Please enter a valid 10-digit Indian mobile number starting with 6, 7, 8, or 9">
                        <input type="hidden" id="full_phone" name="phone">
                    </div>
                </div>
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" class="form-control" required
                        placeholder="johndoe123">
                </div>
            </div>

            <div class="form-group">
                <label for="address">Delivery Address</label>
                <input type="text" id="address" name="address" class="form-control" required
                    placeholder="123 Street Name, City">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" required
                    placeholder="••••••••">
            </div>

            <button type="submit" class="btn btn-primary auth-btn">Create Account</button>
        </form>

        <div class="auth-footer">
            <p>Already have an account? <a href="/login">Sign In</a></p>
            <p style="margin-top: 10px;"><a href="/" style="font-weight: 400; font-size: 0.9rem;">← Back to Home</a></p>
        </div>
    </div>
    <div id="toast-notification" class="toast-notification">
        <span class="toast-icon">⚠️</span>
        <span id="toast-message">Enter a valid Indian mobile number.</span>
    </div>

    <script>
        const phoneInput = document.getElementById('phone');
        const fullPhoneInput = document.getElementById('full_phone');
        const form = document.querySelector('form');
        const toast = document.getElementById('toast-notification');

        function showToast(msg) {
            const toastMsg = document.getElementById('toast-message');
            if (toastMsg) toastMsg.innerText = msg;
            toast.classList.add('active');
            setTimeout(() => {
                toast.classList.remove('active');
            }, 3000);
        }

        // Allow click to dismiss
        toast.addEventListener('click', () => {
            toast.classList.remove('active');
        });

        // Real-time validation for 10 digits
        phoneInput.addEventListener('input', (e) => {
            // Remove any non-numeric characters
            e.target.value = e.target.value.replace(/\D/g, '');

            // Limit to 10 digits
            if (e.target.value.length > 10) {
                e.target.value = e.target.value.slice(0, 10);
            }
        });

        form.addEventListener('submit', (e) => {
            const num = phoneInput.value;
            const indianPhoneRegex = /^[6-9]\d{9}$/;

            if (!indianPhoneRegex.test(num)) {
                e.preventDefault();
                showToast("Enter a valid Indian mobile number (10 digits starting with 6-9)");
                phoneInput.focus();
                return;
            }

            fullPhoneInput.value = "+91" + num;
        });
    </script>
</body>

</html>
