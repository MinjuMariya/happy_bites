<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports | Happy Admin</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/admin.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="admin-layout">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <h2>Happy Admin</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="/admin">📦 <span>Orders</span></a>
                <a href="/admin/users">👥 <span>Users</span></a>
                <a href="/admin/products">🥐 <span>Products</span></a>
                <a href="/admin/reports" class="active">📈 <span>Reports</span></a>
                <a href="/admin/settings">⚙️ <span>Settings</span></a>
                <a href="/" target="_blank">🔗 <span>View Site</span></a>
            </nav>
            <div class="sidebar-footer">
                <a href="/admin/logout">Logout</a>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <h1>Sales Reports</h1>
                <div class="user-info">
                    <span>{{ username }}</span>
                    <a href="/admin/logout"
                        style="margin-left: 10px; color: #ff6b6b; font-size: 0.9em; text-decoration: none;">Logout ➔</a>
                </div>
                <div class="actions">
                    <a href="/admin/export/orders" class="btn-primary">Download CSV Report</a>
                </div>
            </header>

            <div class="dashboard-content">
                <div class="chart-container">
                    <h2 class="chart-title">Product Sales Performance</h2>
                    <canvas id="salesChart"></canvas>
                </div>
            </div>
        </main>
    </div>

    <style>
        .chart-container {
            background: white;
            padding: 2rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            max-width: 800px;
            margin: 0 auto;
        }

        .chart-title {
            margin-bottom: 2rem;
            text-align: center;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            padding: 0.8rem 1.5rem;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }
    </style>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            fetch('/admin/api/stats')
                .then(response => response.json())
                .then(data => {
                    const ctx = document.getElementById('salesChart').getContext('2d');
                    new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: data.labels || [],
                            datasets: [{
                                label: '# of Sales',
                                data: data.data || [],
                                backgroundColor: [
                                    'rgba(212, 163, 115, 0.7)',
                                    'rgba(44, 36, 32, 0.7)',
                                    'rgba(250, 237, 205, 0.7)',
                                    'rgba(163, 113, 113, 0.7)',
                                    'rgba(113, 163, 113, 0.7)'
                                ],
                                borderColor: [
                                    'rgba(212, 163, 115, 1)',
                                    'rgba(44, 36, 32, 1)',
                                    'rgba(250, 237, 205, 1)',
                                    'rgba(163, 113, 113, 1)',
                                    'rgba(113, 163, 113, 1)'
                                ],
                                borderWidth: 1
                            }]
                        },
                        options: {
                            scales: {
                                y: {
                                    beginAtZero: true
                                }
                            }
                        }
                    });
                });
        });
    </script>
</body>

</html>
